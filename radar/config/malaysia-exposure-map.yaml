# Malaysia Exposure Map
# =====================
#
# Each node describes a channel through which a foreign event transmits
# into Malaysian domestic interest. The Haiku daily-pass scorer loads
# this file as context when ranking the day's foreign news for
# Malaysia-impact potential.
#
# Schema per node:
#   id          : kebab-case identifier
#   cat         : category — one of commodity, trade, choke, macro, labor,
#                 diplomacy, tech, climate, security, health, culture
#   note        : 1-2 sentence explanation of Malaysia's exposure on this channel
#   triggers    : free-text examples of foreign events that activate this channel
#   targets     : Malaysian sectors/ministries/markets that feel the impact
#   lag_days    : [min, max] typical days from foreign trigger to MY domestic
#                 surface mention. Used as a horizon prior, not a hard rule.
#   confidence  : high | medium | low — strength of the historical evidence
#                 for this transmission channel
#
# Curated 2026-05-16. Edit freely; the impact pass re-reads on every run.

version: 1
