name = "tfa-social"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Single per-minute cron. The handler runs maybePost() every minute and
# folds in ingestTrends() whenever the scheduled minute is a multiple of 15.
# Consolidated to one trigger to stay within Cloudflare's 5-cron-per-account
# free-plan limit (notify worker uses 4, leaving 1 slot for social).
[triggers]
crons = ["* * * * *"]

[[kv_namespaces]]
binding = "T4A_SOCIAL_KV"
id = "1c25fa43af6d4f7c845df77136f650fa"

[ai]
binding = "AI"

[vars]
SITE_URL = "https://thefourthangle.pages.dev"
BLUESKY_IDENTIFIER = "4thangle.bsky.social"
BLUESKY_PDS = "https://bsky.social"
TARGET_POSTS_PER_DAY = "7"
COOLDOWN_MINUTES = "75"
POST_WINDOW_START_HOUR_MYT = "8"
POST_WINDOW_END_HOUR_MYT = "22"
TREND_CACHE_TTL_MIN = "60"
POSTED_CARD_TTL_DAYS = "30"
# Per-issue cooldown — after posting any card from issue X, no other card
# from X is eligible for this many hours. Prevents same-issue clustering
# when one issue dominates today's trend/radar signals. Per-card 30-day
# cooldown still applies on top.
ISSUE_COOLDOWN_HOURS = "12"
ENABLE_X = "false"

# Secrets (set via `wrangler secret put`):
#   BLUESKY_APP_PASSWORD   — the App Password from Bluesky settings
#   ADMIN_SECRET           — shared secret for /admin/post-now endpoint
