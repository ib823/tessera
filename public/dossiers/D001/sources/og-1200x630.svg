<?xml version="1.0" encoding="UTF-8"?>
<!--
  OG image for Dossier D001 — magazine-cover quality, typography-led.
  Designed for social share previews (WhatsApp, X, Facebook, iMessage).
  Does not depend on the cover illustration — the OG carries its own
  visual identity through type and a single architectural mark.

  Render: cairosvg → PNG 1200×630.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">

  <!-- ============================ BACKGROUND ============================ -->
  <rect width="1200" height="630" fill="#0f0f23"/>

  <!-- Subtle vertical rule at the left, defining the editorial column -->
  <line x1="64" y1="42" x2="64" y2="588" stroke="#9B2C2C" stroke-width="1" opacity="0.7"/>

  <!-- ============================ TOP MARK ============================ -->

  <!-- DOSSIER · D001 burgundy pill -->
  <g transform="translate(96, 56)">
    <rect width="172" height="28" fill="#9B2C2C" rx="1"/>
    <text x="86" y="19" text-anchor="middle"
          font-family="Inter, Helvetica, sans-serif"
          font-size="11" font-weight="600" letter-spacing="3"
          fill="#F4F1EB">DOSSIER · D001</text>
  </g>

  <!-- Series mark -->
  <text x="96" y="118"
        font-family="Inter, Helvetica, sans-serif"
        font-size="10.5" font-weight="500" letter-spacing="2.4"
        fill="#9CA3AF">SERIES 1 · MALAYSIA POLITICAL MECHANICS</text>

  <!-- ============================ TITLE BLOCK ============================ -->

  <!-- Main title — Spectral italic, two lines, warm white -->
  <text x="96" y="222"
        font-family="Spectral, 'Source Serif Pro', Georgia, serif"
        font-size="72" font-style="italic" font-weight="300"
        letter-spacing="-0.5"
        fill="#F4F1EB">How New Parties</text>
  <text x="96" y="300"
        font-family="Spectral, 'Source Serif Pro', Georgia, serif"
        font-size="72" font-style="italic" font-weight="300"
        letter-spacing="-0.5"
        fill="#F4F1EB">Are Built in Malaysia</text>

  <!-- Subtitle — Spectral roman, lighter, muted -->
  <text x="96" y="358"
        font-family="Spectral, 'Source Serif Pro', Georgia, serif"
        font-size="25" font-weight="400" font-style="italic"
        fill="#F4F1EB" opacity="0.72">A Field Guide to the Launch-and-Pivot Playbook</text>

  <!-- ============================ THE MARK ============================ -->
  <!--
    A single architectural symbol: a slightly-ajar door, on the right.
    The dossier's central image is "the negotiation room the voter cannot
    see." A closed door with a sliver of light spilling from it carries
    that idea in one continuous gesture, premium and editorial.

    Rendered as a single-weight white line with a burgundy accent for
    the light beam — same palette as the rest of the dossier.
  -->
  <g transform="translate(820, 168)" fill="none"
     stroke="#F4F1EB" stroke-width="2.4"
     stroke-linecap="round" stroke-linejoin="round"
     opacity="0.92">

    <!-- Doorframe (outer) -->
    <path d="M 0 0 L 0 280 L 240 280 L 240 0 Z"/>

    <!-- Door (slightly ajar, suggesting the room is occupied) -->
    <path d="M 12 14 L 156 14 L 156 268 L 12 268 Z"/>

    <!-- The hinge edge (right side of door, where light spills) -->
    <!-- Light beam: thin burgundy strokes radiating from the gap -->
    <g stroke="#9B2C2C" stroke-width="1.8" opacity="0.85">
      <line x1="158" y1="34"  x2="232" y2="22"/>
      <line x1="158" y1="74"  x2="234" y2="68"/>
      <line x1="158" y1="138" x2="232" y2="142"/>
      <line x1="158" y1="202" x2="234" y2="206"/>
      <line x1="158" y1="248" x2="232" y2="256"/>
    </g>

    <!-- Door handle (a small dot for grounding) -->
    <circle cx="138" cy="142" r="3.6" fill="#F4F1EB" stroke="none"/>
  </g>

  <!-- Caption beside the mark -->
  <text x="820" y="478"
        font-family="Inter, Helvetica, sans-serif"
        font-size="10.5" font-weight="500" letter-spacing="2.2"
        fill="#9CA3AF" opacity="0.85">THE ROOM YOU CANNOT SEE</text>

  <!-- ============================ BOTTOM BAR ============================ -->

  <!-- Bottom hairline rule -->
  <line x1="96" y1="538" x2="1104" y2="538" stroke="#3F1212" stroke-width="1"/>

  <!-- Wordmark, left -->
  <text x="96" y="578"
        font-family="Spectral, 'Source Serif Pro', Georgia, serif"
        font-size="19" font-style="italic" font-weight="400"
        fill="#F4F1EB">The Fourth Angle</text>

  <!-- Read time, centre -->
  <text x="600" y="578" text-anchor="middle"
        font-family="Inter, Helvetica, sans-serif"
        font-size="11" font-weight="500" letter-spacing="2.4"
        fill="#9CA3AF">17 MIN READ · 4,250 WORDS</text>

  <!-- URL, right -->
  <text x="1104" y="578" text-anchor="end"
        font-family="Inter, Helvetica, sans-serif"
        font-size="11" font-weight="500" letter-spacing="1.6"
        fill="#9CA3AF">thefourthangle.pages.dev/dossier/D001</text>

</svg>
