name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'radar/**'
      - 'docs/**'
      - '*.md'
      - 'logo-concepts/**'
      - 'audit/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  # Manual trigger — useful for re-syncing the social bot card index
  # to KV after editing an issue without making a code commit.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate signing secret
        env:
          TFA_PRIVATE_KEY_B64: ${{ secrets.TFA_PRIVATE_KEY_B64 || secrets.SIGNING_KEY_BASE64 }}
          TFA_PRIVATE_KEY_PEM: ${{ secrets.TFA_PRIVATE_KEY_PEM }}
        run: |
          if [ -z "$TFA_PRIVATE_KEY_B64" ] && [ -z "$TFA_PRIVATE_KEY_PEM" ]; then
            echo "Missing signing secret. Configure TFA_PRIVATE_KEY_B64 or TFA_PRIVATE_KEY_PEM."
            exit 1
          fi

      - name: Build
        run: npm run build
        env:
          TFA_PRIVATE_KEY_B64: ${{ secrets.TFA_PRIVATE_KEY_B64 || secrets.SIGNING_KEY_BASE64 }}
          TFA_PRIVATE_KEY_PEM: ${{ secrets.TFA_PRIVATE_KEY_PEM }}

      - name: Bundle-size budget
        run: npm run check-bundle

      - name: Install Playwright browsers
        # Only chromium for the initial CI run. WebKit + Firefox get added
        # once the matrix is known-stable to keep run times predictable
        # under the 30-minute job timeout. See docs/cross-browser-parity/09-ci.md.
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e (chromium-desktop baseline)
        # Deliberately narrow for the first green CI. Widen to chromium-mobile
        # / tablet and firefox / webkit engines in follow-up PRs once this
        # baseline is stable. See docs/cross-browser-parity/09-ci.md.
        run: npm run e2e:ci
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Verify published signatures
        run: npm run check-signatures

      - name: Extract commit subject
        id: msg
        run: |
          SUBJECT=$(echo "$COMMIT_MSG" | head -1 | tr -d '"')
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=thefourthangle --branch=main --commit-message="${{ steps.msg.outputs.subject }}"

      # ── Social bot Worker (workers/social/) ──
      # Skips cleanly until the operator runs the one-time setup:
      #   1. cd workers/social && npx wrangler kv namespace create T4A_SOCIAL_KV
      #   2. paste the returned id into workers/social/wrangler.toml
      #   3. npx wrangler secret put BLUESKY_APP_PASSWORD
      #   4. npx wrangler secret put ADMIN_SECRET
      #   5. commit the updated wrangler.toml
      # After that, every push to main re-deploys the Worker and uploads the
      # latest cards:index to KV.
      - name: Check social Worker configured
        id: social_check
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          if grep -q "REPLACE_WITH_KV_NAMESPACE_ID" workers/social/wrangler.toml; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::social Worker not yet configured — skipping deploy. See workers/social/wrangler.toml comments."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy social Worker
        if: steps.social_check.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/social
          command: deploy

      - name: Upload cards:index to KV
        if: steps.social_check.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/social
          # `--remote` is the default on wrangler v3 (the runner toolchain
          # version); the flag itself was only added in wrangler v4 and
          # errors out with "Unknown argument: remote" on v3.
          command: kv key put --binding T4A_SOCIAL_KV cards:index --path ../../public/social-card-index.json

      - name: Upload radar:current to KV
        if: steps.social_check.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/social
          # Generated by scripts/build-radar-summary.mjs into engine/private/
          # (gitignored; never published). Worker reads via getRadar() at
          # post-decision time. If the summary is missing, the kv put fails
          # softly — scorer falls back to trends-only.
          command: kv key put --binding T4A_SOCIAL_KV radar:current --path ../../engine/private/radar-summary.json
