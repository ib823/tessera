name: T4A Malaysia Impact Pass

on:
  schedule:
    # Once daily at 22:00 UTC (06:00 MYT next morning) — gives the radar's
    # 2-hourly scans a full day of foreign-events accumulation to score.
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  impact-pass:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'radar/requirements.txt'

      - name: Install dependencies
        run: pip install -r radar/requirements.txt

      - name: Run Malaysia impact pass
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python radar/scripts/malaysia-impact-pass.py

      - name: Commit and push impact watch
        if: success()
        run: |
          git config user.name "Fourth Angle Radar"
          git config user.email "fourthangle@proton.me"
          git add radar/output/malaysia-impact-watch.json || true
          git add radar/output/malaysia-impact-watch.md || true
          git diff --staged --quiet || git commit -m "radar: impact pass $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Push failed — will retry next cycle"
